backend:
  name: github
  repo: lars0308/webiste-battermann
  branch: main
  base_url: https://sveltia-cms-auth.lars-batt13.workers.dev

media_folder: "images"
public_folder: "/images"

locale: "de"

collections:
  - name: "site"
    label: "Website-Inhalte"
    files:
      - file: "content/site.json"
        label: "Galerie & Vorher/Nachher"
        name: "site"
        fields:
          - label: "Hinweistext über der Galerie"
            name: "gallery_note"
            widget: "text"

          - label: "Galerie-Bilder"
            name: "gallery"
            widget: "list"
            summary: "{{alt}}"
            fields:
              - label: "Bild"
                name: "image"
                widget: "image"

              - label: "Beschreibung (für Suchmaschinen, nicht sichtbar)"
                name: "alt"
                widget: "string"

              - label: "Kategorie (optional, für die Filter-Buttons im Bildertagebuch, z. B. „Elektro“, „Garten“)"
                name: "kategorie"
                widget: "string"
                required: false
                default: ""

              - label: "Datum (optional — neueste Bilder erscheinen automatisch zuerst)"
                name: "datum"
                widget: "datetime"
                type: "date"
                required: false

          - label: "Einleitungstext Vorher/Nachher"
            name: "vn_intro"
            widget: "text"

          - label: "Zusätzliche Bildertagebuch-Einträge (nur nötig für Bilder, die NICHT schon oben in Galerie oder Vorher/Nachher stehen — die erscheinen automatisch mit ihrer bestehenden Beschriftung im Bildertagebuch)"
            name: "bildertagebuch"
            widget: "list"
            required: false
            summary: "{{fields.text}}"
            fields:
              - {label: "Bild", name: "bild", widget: "image"}
              - {label: "Notiz (z. B. „Leuchten hatten Brandschaden“)", name: "text", widget: "string"}
              - {label: "Kategorie (optional, für die Filter-Buttons)", name: "kategorie", widget: "string", required: false, default: ""}
              - label: "Datum (optional — neueste Einträge erscheinen automatisch zuerst)"
                name: "datum"
                widget: "datetime"
                type: "date"
                required: false

          - label: "Vorher/Nachher-Projekte"
            name: "vorher_nachher"
            widget: "list"
            collapsed: true
            summary: "{{fields.kategorie}} · {{fields.pair_title}}"
            fields:
              - label: "Kategorie (frei wählbar, z. B. „Elektro“, „Sanitär“, „Garten“, „Holz“ — Projekte mit gleicher Kategorie werden automatisch in einer aufklappbaren Gruppe zusammengefasst)"
                name: "kategorie"
                widget: "string"
                required: false
                default: ""

              - label: "Datum (optional — neueste Projekte erscheinen automatisch zuerst)"
                name: "datum"
                widget: "datetime"
                type: "date"
                required: false

              - label: "Titel für dieses Projekt (z. B. „Armatur-Reinigung“)"
                name: "pair_title"
                widget: "string"
                required: false
                default: ""

              - label: "Bildpaare (meist reicht eins — hast du 2 oder 3 Vergleiche zum selben Thema, einfach mehrere hinzufügen; im Schieberegler kann man dann zwischen ihnen durchblättern)"
                name: "bildpaare"
                widget: "list"
                collapsed: true
                summary: "Bildpaar {{index}}"
                fields:
                  - {label: "Vorher-Bild", name: "vorher", widget: "image"}
                  - {label: "Vorher – Beschreibung", name: "vorher_alt", widget: "string", required: false, default: ""}
                  - {label: "Nachher-Bild (leer lassen, solange noch nicht fertig)", name: "nachher", widget: "image", required: false}
                  - {label: "Nachher – Beschreibung", name: "nachher_alt", widget: "string", required: false, default: ""}
                  - {label: "Noch in Arbeit? (zeigt „Nachher folgt“ statt Bild)", name: "pending", widget: "boolean", default: false}

  - name: "theme"
    label: "Design & Kontakt"
    files:
      - file: "content/theme.json"
        label: "Design, Logo & Kontaktdaten"
        name: "theme"
        fields:
          - label: "— Hintergrundfarbe — (Palette antippen ODER eigenen Hex-Code weiter unten eintragen)"
            name: "color_bg"
            widget: "select"
            options:
              - {label: "Beige (aktuell)", value: "#EDE6D6"}
              - {label: "Warmes Weiß", value: "#FAF6EF"}
              - {label: "Sandbeige", value: "#E8DFC8"}
              - {label: "Cremeweiß", value: "#F5F0E6"}
              - {label: "Helles Grau", value: "#EDEDED"}
          - label: "Eigener Hex-Code für Hintergrundfarbe (optional, überschreibt die Palette oben)"
            name: "color_bg_custom"
            widget: "string"
            required: false
            hint: "z. B. #EDE6D6 — leer lassen, um die Palette oben zu nutzen"

          - label: "Hintergrundfarbe (Wechsel-Abschnitte)"
            name: "color_bg_alt"
            widget: "select"
            options:
              - {label: "Beige (aktuell)", value: "#EDE6D6"}
              - {label: "Warmes Weiß", value: "#FAF6EF"}
              - {label: "Sandbeige", value: "#E8DFC8"}
              - {label: "Cremeweiß", value: "#F5F0E6"}
              - {label: "Helles Grau", value: "#EDEDED"}
          - label: "Eigener Hex-Code (optional, überschreibt die Palette oben)"
            name: "color_bg_alt_custom"
            widget: "string"
            required: false
            hint: "z. B. #EDE6D6 — leer lassen, um die Palette oben zu nutzen"

          - label: "Textfarbe"
            name: "color_ink"
            widget: "select"
            options:
              - {label: "Dunkelgrün-Schwarz (aktuell)", value: "#1B231F"}
              - {label: "Reines Schwarz", value: "#111111"}
              - {label: "Dunkelbraun", value: "#2B211B"}
              - {label: "Anthrazit", value: "#262626"}
          - label: "Eigener Hex-Code für Textfarbe (optional, überschreibt die Palette oben)"
            name: "color_ink_custom"
            widget: "string"
            required: false
            hint: "z. B. #1B231F — leer lassen, um die Palette oben zu nutzen"

          - label: "Hauptfarbe (dunkel, z. B. Header/Fußzeile)"
            name: "color_primary"
            widget: "select"
            options:
              - {label: "Dunkelgrün (aktuell)", value: "#122822"}
              - {label: "Tiefblau", value: "#16202E"}
              - {label: "Dunkelbraun", value: "#2B1D12"}
              - {label: "Schwarzgrün", value: "#0F1A16"}
          - label: "Eigener Hex-Code für Hauptfarbe (optional, überschreibt die Palette oben)"
            name: "color_primary_custom"
            widget: "string"
            required: false
            hint: "z. B. #122822 — leer lassen, um die Palette oben zu nutzen"

          - label: "Überschriften-Farbe"
            name: "color_heading"
            widget: "select"
            options:
              - {label: "Logo-Oliv (aktuell)", value: "#5F6A42"}
              - {label: "Waldgrün", value: "#3F5B3C"}
              - {label: "Olivbraun", value: "#6B5B3E"}
              - {label: "Dunkelgrau", value: "#4A4A4A"}
          - label: "Eigener Hex-Code für Überschriften-Farbe (optional, überschreibt die Palette oben)"
            name: "color_heading_custom"
            widget: "string"
            required: false
            hint: "z. B. #5F6A42 — leer lassen, um die Palette oben zu nutzen"

          - label: "Hintergrundfarbe der Menüleiste oben"
            name: "color_header_bg"
            widget: "select"
            options:
              - {label: "Beige, halbtransparent (aktuell)", value: "rgba(246,243,236,0.92)"}
              - {label: "Weiß, halbtransparent", value: "rgba(255,255,255,0.9)"}
              - {label: "Dunkelgrün, halbtransparent", value: "rgba(18,40,34,0.92)"}
              - {label: "Beige, deckend", value: "#EDE6D6"}
          - label: "Eigener Hex-/rgba-Code für Menüleiste (optional, überschreibt die Palette oben)"
            name: "color_header_bg_custom"
            widget: "string"
            required: false
            hint: "z. B. rgba(246,243,236,0.92) oder #EDE6D6 — leer lassen, um die Palette oben zu nutzen"

          - label: "Akzentfarbe (Buttons, Hervorhebungen)"
            name: "color_accent"
            widget: "select"
            options:
              - {label: "Terracotta (aktuell)", value: "#C1622D"}
              - {label: "Ziegelrot", value: "#B0492E"}
              - {label: "Senfgelb", value: "#D6A93B"}
              - {label: "Waldgrün", value: "#4C7A4F"}
              - {label: "Petrol", value: "#2E7B7B"}
          - label: "Eigener Hex-Code für Akzentfarbe (optional, überschreibt die Palette oben)"
            name: "color_accent_custom"
            widget: "string"
            required: false
            hint: "z. B. #C1622D — leer lassen, um die Palette oben zu nutzen"

          - label: "Zweitfarbe (Grün-Ton)"
            name: "color_sage"
            widget: "select"
            options:
              - {label: "Salbeigrün (aktuell)", value: "#6F8F6B"}
              - {label: "Graugrün", value: "#8A9A8C"}
              - {label: "Moosgrün", value: "#55724F"}
          - label: "Eigener Hex-Code für Zweitfarbe (optional, überschreibt die Palette oben)"
            name: "color_sage_custom"
            widget: "string"
            required: false
            hint: "z. B. #6F8F6B — leer lassen, um die Palette oben zu nutzen"

          - label: "Abstand zwischen Abschnitten"
            name: "section_spacing"
            widget: "select"
            options:
              - {label: "Kompakt", value: "kompakt"}
              - {label: "Normal", value: "normal"}
              - {label: "Großzügig", value: "grosszuegig"}
            default: "normal"

          - {label: "— Logo & Bild —", name: "logo", widget: "image", hint: "Logo"}
          - {label: "Portraitbild (Hero & Über mich)", name: "portrait", widget: "image"}
          - {label: "Firmenname (groß, im Header)", name: "brand_name", widget: "string"}
          - {label: "Firmenzusatz (klein, im Header)", name: "brand_sub", widget: "string"}

          - label: "Farbe „Battermann“ im Header (großer Text)"
            name: "color_brand"
            widget: "select"
            required: false
            options:
              - {label: "Wie Hauptfarbe (Standard)", value: ""}
              - {label: "Dunkelgrün", value: "#122822"}
              - {label: "Terracotta", value: "#C1622D"}
              - {label: "Schwarz", value: "#111111"}
              - {label: "Logo-Oliv", value: "#5F6A42"}
          - label: "Eigener Hex-Code dafür (optional, überschreibt die Auswahl oben)"
            name: "color_brand_custom"
            widget: "string"
            required: false
            hint: "z. B. #122822 — leer lassen, um die Auswahl oben zu nutzen"

          - label: "Farbe „Objekt- & Reparaturservice“ im Header (kleiner Text)"
            name: "color_brand_sub"
            widget: "select"
            required: false
            options:
              - {label: "Wie gedämpfte Textfarbe (Standard)", value: ""}
              - {label: "Grau-Grün", value: "#4B564F"}
              - {label: "Terracotta", value: "#C1622D"}
              - {label: "Logo-Oliv", value: "#5F6A42"}
              - {label: "Grau", value: "#767676"}
          - label: "Eigener Hex-Code dafür (optional, überschreibt die Auswahl oben)"
            name: "color_brand_sub_custom"
            widget: "string"
            required: false
            hint: "z. B. #4B564F — leer lassen, um die Auswahl oben zu nutzen"

          - label: "— Menüpunkte im Header —"
            name: "nav_label_ueber_mich"
            widget: "string"
            default: "Über mich"
            hint: "Text für den Menüpunkt „Über mich“"
          - {label: "Menüpunkt „Leistungen“", name: "nav_label_leistungen", widget: "string", default: "Leistungen"}
          - {label: "Menüpunkt „Bilder“", name: "nav_label_bilder", widget: "string", default: "Bilder"}
          - {label: "Menüpunkt „Einsatzgebiet“", name: "nav_label_einsatzgebiet", widget: "string", default: "Einsatzgebiet"}

          - label: "Farbe der Menüpunkte im Header"
            name: "color_nav_links"
            widget: "select"
            required: false
            options:
              - {label: "Wie Textfarbe (Standard)", value: ""}
              - {label: "Dunkelgrün", value: "#122822"}
              - {label: "Terracotta", value: "#C1622D"}
              - {label: "Schwarz", value: "#111111"}
              - {label: "Logo-Oliv", value: "#5F6A42"}
          - label: "Eigener Hex-Code dafür (optional, überschreibt die Auswahl oben)"
            name: "color_nav_links_custom"
            widget: "string"
            required: false
            hint: "z. B. #122822 — leer lassen, um die Auswahl oben zu nutzen"

          - label: "Farbe der Buttons (z. B. „Termin anfragen“) — unabhängig von der Hauptfarbe"
            name: "color_btn"
            widget: "select"
            required: false
            options:
              - {label: "Wie Hauptfarbe (Standard)", value: ""}
              - {label: "Dunkelgrün", value: "#122822"}
              - {label: "Terracotta", value: "#C1622D"}
              - {label: "Waldgrün", value: "#4C7A4F"}
              - {label: "Petrol", value: "#2E7B7B"}
              - {label: "Schwarz", value: "#111111"}
          - label: "Eigener Hex-Code für Buttons (optional, überschreibt die Auswahl oben)"
            name: "color_btn_custom"
            widget: "string"
            required: false
            hint: "z. B. #C1622D — leer lassen, um die Auswahl oben zu nutzen"

          - label: "Bilder-Karussell dreht automatisch weiter?"
            name: "gallery_autoplay"
            widget: "boolean"
            default: true

          - label: "Geschwindigkeit (Sekunden zwischen den Schritten)"
            name: "gallery_autoplay_seconds"
            widget: "number"
            default: 4
            min: 2
            max: 15
            required: false

          - {label: "— Zielgruppen-Umschalter —", name: "audience_label_privat", widget: "string", hint: "Beschriftung Button 1", default: "Privatkunden"}
          - {label: "Beschriftung Button 2", name: "audience_label_business", widget: "string", default: "Hausverwaltung & Firmen"}

          - {label: "— Startbereich (Hero) —", name: "hero_eyebrow", widget: "string", hint: "Kleiner Text über der Überschrift"}
          - {label: "Überschrift – Zeile 1", name: "hero_headline_1", widget: "string"}
          - {label: "Überschrift – Zeile 2", name: "hero_headline_2", widget: "string"}
          - {label: "Überschrift – Zeile 3 (kursiv)", name: "hero_headline_3", widget: "string"}
          - {label: "Beschreibungstext (für Privatkunden, Standard-Ansicht)", name: "hero_lead", widget: "text"}
          - {label: "Beschreibungstext (für Hausverwaltung & Firmen)", name: "hero_lead_business", widget: "text", required: false}
          - {label: "Vertrauens-Punkt 4 (unter den Hero-Buttons, z. B. „Kein Callcenter“)", name: "trust_item_4", widget: "string", required: false}
          - {label: "Zusatz-Hinweis für Privatkunden (optional, erscheint zusätzlich unter dem Text)", name: "audience_note_privat", widget: "text", required: false}
          - {label: "Zusatz-Hinweis für Hausverwaltung & Firmen (optional)", name: "audience_note_business", widget: "text", required: false}

          - {label: "— Über-mich-Bereich —", name: "about_tag", widget: "string", hint: "Kurzer Titel am Bild"}
          - {label: "Kleiner Text über der Überschrift", name: "about_eyebrow", widget: "string"}
          - {label: "Überschrift", name: "about_headline", widget: "string"}
          - {label: "Hervorgehobener erster Satz", name: "about_emph", widget: "text"}
          - {label: "Absatz 1", name: "about_p1", widget: "text"}
          - {label: "Absatz 2", name: "about_p2", widget: "text"}
          - {label: "Unterschrift", name: "about_signoff", widget: "string"}

          - {label: "— Kontaktdaten —", name: "phone_display", widget: "string", hint: "Telefonnummer, angezeigt, z. B. +49 155 / 674 677 63"}
          - {label: "Telefonnummer (technisch, für Anruf-Link, z. B. +4915567467763)", name: "phone_tel", widget: "string"}
          - {label: "WhatsApp-Nummer (technisch, nur Ziffern, z. B. 4915567467763)", name: "whatsapp_number", widget: "string"}
          - {label: "E-Mail-Adresse", name: "email", widget: "string"}
          - {label: "Öffnungszeiten (Text)", name: "hours_text", widget: "string"}
          - {label: "Kontakt-Einleitungstext (für Privatkunden)", name: "contact_intro_privat", widget: "text", required: false}
          - {label: "Kontakt-Einleitungstext (für Hausverwaltung & Firmen)", name: "contact_intro_business", widget: "text", required: false}

          - {label: "— Fußzeile —", name: "footer_text", widget: "string", hint: "Copyright-Text unten"}

          - label: "Ankündigung anzeigen? (z. B. Rabatt-Aktion oder Urlaubshinweis)"
            name: "announce_active"
            widget: "boolean"
            default: false

          - label: "Ankündigungstext"
            name: "announce_text"
            widget: "string"
            required: false
            hint: "z. B. „Bis zum 30.07.2026 gibt es 15% Rabatt für Neukunden“"

          - label: "Automatisch ausblenden ab diesem Datum (optional)"
            name: "announce_until"
            widget: "datetime"
            type: "date"
            required: false
            hint: "Nach diesem Tag erscheint das Popup nicht mehr, auch wenn oben noch aktiviert ist"

          - {label: "Überschrift des Bewertungs-Bereichs", name: "reviews_headline", widget: "string", default: "Das sagen Kunden", required: false}

          - label: "Reihenfolge der Bereiche auf der Startseite"
            name: "section_order"
            widget: "list"
            required: false
            summary: "{{fields.section}}"
            hint: "So sortierst du die Startseite um: Auf das Symbol ⋮⋮ links neben einem Eintrag tippen, gedrückt halten und an die gewünschte Stelle ziehen. Der oberste Eintrag in dieser Liste erscheint ganz oben auf der Seite, der unterste ganz unten."
            default:
              - section: "hero"
              - section: "kernbereiche"
              - section: "ueber-mich"
              - section: "warum"
              - section: "leistungen"
              - section: "galerie"
              - section: "vorher-nachher"
              - section: "bewertungen"
              - section: "einsatzgebiet"
              - section: "kontakt"
            fields:
              - label: "Abschnitt"
                name: "section"
                widget: "select"
                options:
                  - {label: "Hero (Titelbereich mit Überschrift & Zielgruppen-Buttons)", value: "hero"}
                  - {label: "Kernbereiche (3 Kacheln)", value: "kernbereiche"}
                  - {label: "Über mich", value: "ueber-mich"}
                  - {label: "Warum Battermann", value: "warum"}
                  - {label: "Leistungen", value: "leistungen"}
                  - {label: "Galerie (Einblicke in meine Arbeit)", value: "galerie"}
                  - {label: "Vorher/Nachher", value: "vorher-nachher"}
                  - {label: "Bewertungen", value: "bewertungen"}
                  - {label: "Einsatzgebiet", value: "einsatzgebiet"}
                  - {label: "Kontakt", value: "kontakt"}
