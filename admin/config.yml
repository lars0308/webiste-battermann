backend:
  name: github
  repo: lars0308/webiste-battermann
  branch: main
  base_url: https://sveltia-cms-auth.lars-batt13.workers.dev

media_folder: "images"
public_folder: "/images"

locale: "de"

collections:
  - name: "site"
    label: "🖼️ Bilder & Projekte"
    files:
      - file: "content/site.json"
        label: "🖼️  Galerie, Vorher/Nachher & Tagebuch"
        name: "site"
        fields:
          - label: "Hinweistext über der Galerie"
            name: "gallery_note"
            widget: "text"

          - label: "Galerie-Bilder"
            name: "gallery"
            widget: "list"
            summary: "{{alt}}"
            fields:
              - label: "Bild"
                name: "image"
                widget: "image"

              - label: "Beschreibung (für Suchmaschinen, nicht sichtbar)"
                name: "alt"
                widget: "string"

              - label: "Kategorie (optional, für die Filter-Buttons im Bildertagebuch, z. B. „Elektro“, „Garten“)"
                name: "kategorie"
                widget: "string"
                required: false
                default: ""

              - label: "Datum (optional — neueste Bilder erscheinen automatisch zuerst)"
                name: "datum"
                widget: "datetime"
                type: "date"
                required: false

          - label: "Einleitungstext Vorher/Nachher"
            name: "vn_intro"
            widget: "text"

          - label: "Zusätzliche Bildertagebuch-Einträge (nur nötig für Bilder, die NICHT schon oben in Galerie oder Vorher/Nachher stehen — die erscheinen automatisch mit ihrer bestehenden Beschriftung im Bildertagebuch)"
            name: "bildertagebuch"
            widget: "list"
            required: false
            summary: "{{fields.text}}"
            fields:
              - {label: "Bild", name: "bild", widget: "image"}
              - {label: "Notiz (z. B. „Leuchten hatten Brandschaden“)", name: "text", widget: "string"}
              - {label: "Kategorie (optional, für die Filter-Buttons)", name: "kategorie", widget: "string", required: false, default: ""}
              - label: "Datum (optional — neueste Einträge erscheinen automatisch zuerst)"
                name: "datum"
                widget: "datetime"
                type: "date"
                required: false

          - label: "Vorher/Nachher-Projekte"
            name: "vorher_nachher"
            widget: "list"
            collapsed: true
            summary: "{{fields.kategorie}} · {{fields.pair_title}}"
            fields:
              - label: "Kategorie (frei wählbar, z. B. „Elektro“, „Sanitär“, „Garten“, „Holz“ — Projekte mit gleicher Kategorie werden automatisch in einer aufklappbaren Gruppe zusammengefasst)"
                name: "kategorie"
                widget: "string"
                required: false
                default: ""

              - label: "Datum (optional — neueste Projekte erscheinen automatisch zuerst)"
                name: "datum"
                widget: "datetime"
                type: "date"
                required: false

              - label: "Titel für dieses Projekt (z. B. „Armatur-Reinigung“)"
                name: "pair_title"
                widget: "string"
                required: false
                default: ""

              - label: "Bildpaare (meist reicht eins — hast du 2 oder 3 Vergleiche zum selben Thema, einfach mehrere hinzufügen; im Schieberegler kann man dann zwischen ihnen durchblättern)"
                name: "bildpaare"
                widget: "list"
                collapsed: true
                summary: "Bildpaar {{index}}"
                fields:
                  - {label: "Vorher-Bild", name: "vorher", widget: "image"}
                  - {label: "Vorher – Beschreibung", name: "vorher_alt", widget: "string", required: false, default: ""}
                  - {label: "Nachher-Bild (leer lassen, solange noch nicht fertig)", name: "nachher", widget: "image", required: false}
                  - {label: "Nachher – Beschreibung", name: "nachher_alt", widget: "string", required: false, default: ""}
                  - {label: "Noch in Arbeit? (zeigt „Nachher folgt“ statt Bild)", name: "pending", widget: "boolean", default: false}

  - name: "theme"
    label: "🎨 Design & Inhalte"
    files:
      - file: "content/design.json"
        label: "🎨  Farben & Design"
        name: "design"
        fields:
          - label: "Hintergrundfarbe"
            name: "color_bg"
            widget: "select"
            options:
              - {label: "Beige (aktuell)", value: "#EDE6D6"}
              - {label: "Warmes Weiß", value: "#FAF6EF"}
              - {label: "Sandbeige", value: "#E8DFC8"}
              - {label: "Cremeweiß", value: "#F5F0E6"}
              - {label: "Helles Grau", value: "#EDEDED"}
          - {label: "Eigener Hex-Code (überschreibt die Auswahl oben)", name: "color_bg_custom", widget: "string", required: false, hint: "z. B. #EDE6D6 — leer lassen für die Auswahl oben"}

          - label: "Hintergrundfarbe (Wechsel-Abschnitte)"
            name: "color_bg_alt"
            widget: "select"
            options:
              - {label: "Beige (aktuell)", value: "#EDE6D6"}
              - {label: "Warmes Weiß", value: "#FAF6EF"}
              - {label: "Sandbeige", value: "#E8DFC8"}
              - {label: "Cremeweiß", value: "#F5F0E6"}
              - {label: "Helles Grau", value: "#EDEDED"}
          - {label: "Eigener Hex-Code (überschreibt die Auswahl oben)", name: "color_bg_alt_custom", widget: "string", required: false, hint: "z. B. #EDE6D6 — leer lassen für die Auswahl oben"}

          - label: "Textfarbe"
            name: "color_ink"
            widget: "select"
            options:
              - {label: "Dunkelgrün-Schwarz (aktuell)", value: "#1B231F"}
              - {label: "Reines Schwarz", value: "#111111"}
              - {label: "Dunkelbraun", value: "#2B211B"}
              - {label: "Anthrazit", value: "#262626"}
          - {label: "Eigener Hex-Code (überschreibt die Auswahl oben)", name: "color_ink_custom", widget: "string", required: false, hint: "z. B. #1B231F — leer lassen für die Auswahl oben"}

          - label: "Hauptfarbe (Header/Hero/Fußzeile-Hintergrund)"
            name: "color_primary"
            widget: "select"
            options:
              - {label: "Dunkelgrün (aktuell)", value: "#122822"}
              - {label: "Tiefblau", value: "#16202E"}
              - {label: "Dunkelbraun", value: "#2B1D12"}
              - {label: "Schwarzgrün", value: "#0F1A16"}
          - {label: "Eigener Hex-Code (überschreibt die Auswahl oben)", name: "color_primary_custom", widget: "string", required: false, hint: "z. B. #122822 — leer lassen für die Auswahl oben"}

          - label: "Überschriften-Farbe"
            name: "color_heading"
            widget: "select"
            options:
              - {label: "Logo-Oliv (aktuell)", value: "#5F6A42"}
              - {label: "Waldgrün", value: "#3F5B3C"}
              - {label: "Olivbraun", value: "#6B5B3E"}
              - {label: "Dunkelgrau", value: "#4A4A4A"}
          - {label: "Eigener Hex-Code (überschreibt die Auswahl oben)", name: "color_heading_custom", widget: "string", required: false, hint: "z. B. #5F6A42 — leer lassen für die Auswahl oben"}

          - label: "Akzentfarbe (Buttons, Hervorhebungen)"
            name: "color_accent"
            widget: "select"
            options:
              - {label: "Terracotta (aktuell)", value: "#C1622D"}
              - {label: "Ziegelrot", value: "#B0492E"}
              - {label: "Senfgelb", value: "#D6A93B"}
              - {label: "Waldgrün", value: "#4C7A4F"}
              - {label: "Petrol", value: "#2E7B7B"}
          - {label: "Eigener Hex-Code (überschreibt die Auswahl oben)", name: "color_accent_custom", widget: "string", required: false, hint: "z. B. #C1622D — leer lassen für die Auswahl oben"}

          - label: "Zweitfarbe (Grün-Ton)"
            name: "color_sage"
            widget: "select"
            options:
              - {label: "Salbeigrün (aktuell)", value: "#6F8F6B"}
              - {label: "Graugrün", value: "#8A9A8C"}
              - {label: "Moosgrün", value: "#55724F"}
          - {label: "Eigener Hex-Code (überschreibt die Auswahl oben)", name: "color_sage_custom", widget: "string", required: false, hint: "z. B. #6F8F6B — leer lassen für die Auswahl oben"}

          - label: "Hintergrundfarbe der Menüleiste oben"
            name: "color_header_bg"
            widget: "select"
            options:
              - {label: "Beige, halbtransparent (aktuell)", value: "rgba(246,243,236,0.92)"}
              - {label: "Weiß, halbtransparent", value: "rgba(255,255,255,0.9)"}
              - {label: "Dunkelgrün, halbtransparent", value: "rgba(18,40,34,0.92)"}
              - {label: "Beige, deckend", value: "#EDE6D6"}
          - {label: "Eigener Hex-/rgba-Code (überschreibt die Auswahl oben)", name: "color_header_bg_custom", widget: "string", required: false, hint: "z. B. rgba(246,243,236,0.92) oder #EDE6D6"}

          - label: "Farbe „Battermann“ im Header (großer Text)"
            name: "color_brand"
            widget: "select"
            required: false
            options:
              - {label: "Wie Hauptfarbe (Standard)", value: ""}
              - {label: "Dunkelgrün", value: "#122822"}
              - {label: "Terracotta", value: "#C1622D"}
              - {label: "Schwarz", value: "#111111"}
              - {label: "Logo-Oliv", value: "#5F6A42"}
          - {label: "Eigener Hex-Code (überschreibt die Auswahl oben)", name: "color_brand_custom", widget: "string", required: false, hint: "z. B. #122822 — leer lassen für die Auswahl oben"}

          - label: "Farbe „Objekt- & Reparaturservice“ im Header (kleiner Text)"
            name: "color_brand_sub"
            widget: "select"
            required: false
            options:
              - {label: "Wie gedämpfte Textfarbe (Standard)", value: ""}
              - {label: "Grau-Grün", value: "#4B564F"}
              - {label: "Terracotta", value: "#C1622D"}
              - {label: "Logo-Oliv", value: "#5F6A42"}
              - {label: "Grau", value: "#767676"}
          - {label: "Eigener Hex-Code (überschreibt die Auswahl oben)", name: "color_brand_sub_custom", widget: "string", required: false, hint: "z. B. #4B564F — leer lassen für die Auswahl oben"}

          - label: "Farbe der Menüpunkte (Über mich, Leistungen, …)"
            name: "color_nav_links"
            widget: "select"
            required: false
            options:
              - {label: "Wie Textfarbe (Standard)", value: ""}
              - {label: "Dunkelgrün", value: "#122822"}
              - {label: "Terracotta", value: "#C1622D"}
              - {label: "Schwarz", value: "#111111"}
              - {label: "Logo-Oliv", value: "#5F6A42"}
          - {label: "Eigener Hex-Code (überschreibt die Auswahl oben)", name: "color_nav_links_custom", widget: "string", required: false, hint: "z. B. #122822 — leer lassen für die Auswahl oben"}

          - label: "Farbe der Buttons (z. B. „Termin anfragen“)"
            name: "color_btn"
            widget: "select"
            required: false
            options:
              - {label: "Wie Hauptfarbe (Standard)", value: ""}
              - {label: "Dunkelgrün", value: "#122822"}
              - {label: "Terracotta", value: "#C1622D"}
              - {label: "Waldgrün", value: "#4C7A4F"}
              - {label: "Petrol", value: "#2E7B7B"}
              - {label: "Schwarz", value: "#111111"}
          - {label: "Eigener Hex-Code (überschreibt die Auswahl oben)", name: "color_btn_custom", widget: "string", required: false, hint: "z. B. #C1622D — leer lassen für die Auswahl oben"}

          - label: "Abstand zwischen Abschnitten"
            name: "section_spacing"
            widget: "select"
            options:
              - {label: "Kompakt", value: "kompakt"}
              - {label: "Normal", value: "normal"}
              - {label: "Großzügig", value: "grosszuegig"}
            default: "normal"

          - {label: "Logo", name: "logo", widget: "image"}
          - {label: "Portraitbild (Hero & Über mich)", name: "portrait", widget: "image"}

          - {label: "Bilder-Karussell dreht automatisch weiter?", name: "gallery_autoplay", widget: "boolean", default: true}
          - {label: "Geschwindigkeit (Sekunden zwischen den Schritten)", name: "gallery_autoplay_seconds", widget: "number", default: 4, min: 2, max: 15, required: false}

      - file: "content/header.json"
        label: "🧭  Header & Menü"
        name: "header"
        fields:
          - {label: "Firmenname (groß, im Header)", name: "brand_name", widget: "string"}
          - {label: "Firmenzusatz (klein, im Header)", name: "brand_sub", widget: "string"}
          - {label: "Menüpunkt „Über mich“", name: "nav_label_ueber_mich", widget: "string"}
          - {label: "Menüpunkt „Leistungen“", name: "nav_label_leistungen", widget: "string"}
          - {label: "Menüpunkt „Bilder“", name: "nav_label_bilder", widget: "string"}
          - {label: "Menüpunkt „Einsatzgebiet“", name: "nav_label_einsatzgebiet", widget: "string"}

      - file: "content/hero.json"
        label: "🏠  Startseite – Hero"
        name: "hero"
        fields:
          - {label: "Beschriftung Zielgruppen-Button 1", name: "audience_label_privat", widget: "string"}
          - {label: "Beschriftung Zielgruppen-Button 2", name: "audience_label_business", widget: "string"}
          - {label: "Kleiner Text über der Überschrift", name: "hero_eyebrow", widget: "string"}
          - {label: "Überschrift – Zeile 1", name: "hero_headline_1", widget: "string"}
          - {label: "Überschrift – Zeile 2", name: "hero_headline_2", widget: "string"}
          - {label: "Überschrift – Zeile 3 (kursiv)", name: "hero_headline_3", widget: "string"}
          - {label: "Beschreibungstext (Privatkunden)", name: "hero_lead", widget: "text"}
          - {label: "Beschreibungstext (Hausverwaltung & Firmen)", name: "hero_lead_business", widget: "text", required: false}
          - {label: "Vertrauens-Punkt 4 (unter den Hero-Buttons)", name: "trust_item_4", widget: "string", required: false}
          - {label: "Zusatz-Hinweis für Privatkunden (optional)", name: "audience_note_privat", widget: "text", required: false}
          - {label: "Zusatz-Hinweis für Hausverwaltung & Firmen (optional)", name: "audience_note_business", widget: "text", required: false}

      - file: "content/about.json"
        label: "👤  Über mich"
        name: "about"
        fields:
          - {label: "Kurzer Titel am Bild", name: "about_tag", widget: "string"}
          - {label: "Kleiner Text über der Überschrift", name: "about_eyebrow", widget: "string"}
          - {label: "Überschrift", name: "about_headline", widget: "string"}
          - {label: "Hervorgehobener erster Satz", name: "about_emph", widget: "text"}
          - {label: "Absatz 1", name: "about_p1", widget: "text"}
          - {label: "Absatz 2", name: "about_p2", widget: "text"}
          - {label: "Unterschrift", name: "about_signoff", widget: "string"}

      - file: "content/contact.json"
        label: "📞  Kontaktdaten"
        name: "contact"
        fields:
          - {label: "Telefonnummer (angezeigt)", name: "phone_display", widget: "string", hint: "z. B. +49 155 / 674 677 63"}
          - {label: "Telefonnummer (technisch, für Anruf-Link)", name: "phone_tel", widget: "string", hint: "z. B. +4915567467763"}
          - {label: "WhatsApp-Nummer (nur Ziffern)", name: "whatsapp_number", widget: "string", hint: "z. B. 4915567467763"}
          - {label: "E-Mail-Adresse", name: "email", widget: "string"}
          - {label: "Öffnungszeiten (Text)", name: "hours_text", widget: "string"}
          - {label: "Kontakt-Einleitungstext (Privatkunden)", name: "contact_intro_privat", widget: "text", required: false}
          - {label: "Kontakt-Einleitungstext (Hausverwaltung & Firmen)", name: "contact_intro_business", widget: "text", required: false}

      - file: "content/popup.json"
        label: "📢  Popup & Hinweis-Banner"
        name: "popup"
        fields:
          - {label: "Ankündigung anzeigen? (z. B. Rabatt-Aktion oder Urlaubshinweis)", name: "announce_active", widget: "boolean", default: false}
          - label: "Anzeige-Art"
            name: "announce_style"
            widget: "select"
            default: "popup"
            options:
              - {label: "Als Popup (schließbares Fenster beim Laden)", value: "popup"}
              - {label: "Als dauerhafter Hinweis-Balken oben (nicht störend)", value: "banner"}
              - {label: "Beides gleichzeitig", value: "both"}
          - {label: "Ankündigungstext", name: "announce_text", widget: "string", required: false, hint: "z. B. „Bis zum 30.07.2026 gibt es 15% Rabatt für Neukunden“"}
          - label: "Automatisch ausblenden ab diesem Datum (optional)"
            name: "announce_until"
            widget: "datetime"
            type: "date"
            required: false
            hint: "Nach diesem Tag erscheint das Popup/der Banner nicht mehr, auch wenn oben noch aktiviert ist"

      - file: "content/misc.json"
        label: "⚙️  Sonstiges"
        name: "misc"
        fields:
          - {label: "Überschrift des Bewertungs-Bereichs", name: "reviews_headline", widget: "string", default: "Das sagen Kunden", required: false}
          - {label: "Copyright-Text unten (Fußzeile)", name: "footer_text", widget: "string"}
          - label: "Reihenfolge der Bereiche auf der Startseite"
            name: "section_order"
            widget: "list"
            required: false
            summary: "{{fields.section}}"
            hint: "So sortierst du die Startseite um: Auf das Symbol ⋮⋮ links neben einem Eintrag tippen, gedrückt halten und an die gewünschte Stelle ziehen. Der oberste Eintrag in dieser Liste erscheint ganz oben auf der Seite, der unterste ganz unten."
            fields:
              - label: "Abschnitt"
                name: "section"
                widget: "select"
                options:
                  - {label: "Hero (Titelbereich mit Überschrift & Zielgruppen-Buttons)", value: "hero"}
                  - {label: "Kernbereiche (3 Kacheln)", value: "kernbereiche"}
                  - {label: "Über mich", value: "ueber-mich"}
                  - {label: "Warum Battermann", value: "warum"}
                  - {label: "Leistungen", value: "leistungen"}
                  - {label: "Galerie (Einblicke in meine Arbeit)", value: "galerie"}
                  - {label: "Vorher/Nachher", value: "vorher-nachher"}
                  - {label: "Bewertungen", value: "bewertungen"}
                  - {label: "Einsatzgebiet", value: "einsatzgebiet"}
                  - {label: "Kontakt", value: "kontakt"}
